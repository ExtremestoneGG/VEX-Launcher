name: Build VEX Launcher

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Microsoft login helper
        shell: powershell
        run: .\build-auth-helper.ps1

      - name: Check frontend
        run: npm run build

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build installer
        run: npm run tauri -- build

      - name: Create portable executable
        shell: powershell
        run: Copy-Item src-tauri\target\release\vex-launcher.exe "src-tauri\target\release\VEX Launcher Portable.exe"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: VEX-Launcher-Windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/VEX Launcher Portable.exe
          if-no-files-found: error

  linux:
    name: Linux AppImage
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build AppImage
        run: npm run tauri -- build --bundles appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: VEX-Launcher-Linux-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
