<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        position: relative;
        display: flex;
        align-items: center;
        background: #12171b;
        color: #fff;
        font-family: "Segoe UI", sans-serif;
      }
      body::before, body::after {
        content: "";
        position: absolute;
        border: 1px solid rgba(200,235,255,.25);
        border-radius: 50%;
      }
      body::after { border-color: rgba(200,235,255,.11); }
      .face, .wordmark { position: relative; z-index: 1; display: block; object-fit: contain; }
      .header { width: 150px; height: 57px; gap: 8px; padding: 7px 10px; }
      .header::before { width: 75px; height: 75px; right: -32px; top: -48px; }
      .header::after { width: 104px; height: 104px; right: -52px; top: -63px; }
      .header .face { width: 37px; height: 37px; }
      .header .wordmark { width: 75px; height: 38px; }
      .sidebar { width: 164px; height: 314px; flex-direction: column; justify-content: center; gap: 24px; padding: 34px 20px; }
      .sidebar::before { width: 250px; height: 250px; left: -145px; bottom: -105px; }
      .sidebar::after { width: 205px; height: 205px; right: -145px; top: -85px; }
      .sidebar .face { width: 104px; height: 96px; }
      .sidebar .wordmark { width: 112px; height: 58px; }
      .header .sidebar-only, .sidebar .header-only { display: none; }
    </style>
  </head>
  <body>
    <img class="face" src="../../src/assets/vexface.svg" alt="" />
    <img class="wordmark" src="../../src/assets/vex.svg" alt="" />
    <script>document.body.className = location.search.includes("sidebar") ? "sidebar" : "header";</script>
  </body>
</html>
